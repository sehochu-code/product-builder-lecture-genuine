<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotto Number Drawer</title>
    <link href='/style.css' rel='stylesheet'>
</head>
<body>
    <label class="theme-toggle" aria-label="Toggle dark mode">
        <span>☀️</span>
        <div class="toggle-switch">
            <input type="checkbox" id="theme-toggle-input">
            <div class="toggle-slider"></div>
        </div>
        <span>🌙</span>
    </label>
    <div class="container">
        <h1>Lotto Number Drawer</h1>
        <div class="lotto-machine">
            <div id="games" class="games-container"></div>
            <button id="draw-button">Draw</button>
        </div>

        <div class="contact-section">
            <h2>제휴 문의</h2>
            <form id="contact-form" action="https://formspree.io/f/mnjollnq" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label for="company">회사명</label>
                    <input type="text" id="company" name="company" placeholder="(주)회사이름">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="제휴 관련 문의 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" class="submit-button">문의 보내기</button>
                <p id="form-status" class="form-status"></p>
            </form>
        </div>

        <div class="disqus-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-evhh7udbrf.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
